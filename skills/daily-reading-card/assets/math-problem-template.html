<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日一题 · 第{{issue}}期</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f4f0;
    display: flex;
    justify-content: center;
    padding: 20px 0;
  }
  .card {
    width: 720px;
    background: #ffffff;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(91,138,114,0.15);
    overflow: hidden;
  }
  .header {
    background: linear-gradient(135deg, #5b8a72, #6fa38a);
    color: white;
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-left .label {
    font-size: 13px;
    opacity: 0.9;
    margin-bottom: 2px;
  }
  .header-left .issue {
    font-size: 22px;
    font-weight: 700;
  }
  .header-right {
    text-align: right;
  }
  .header-right .date {
    font-size: 13px;
    opacity: 0.9;
  }
  .header-right .subject {
    font-size: 14px;
    margin-top: 2px;
  }
  .section {
    padding: 20px 28px;
    border-bottom: 1px solid #e8f0ec;
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #5b8a72;
    margin-bottom: 12px;
  }
  .tag {
    display: inline-block;
    background: #e8f4ef;
    color: #5b8a72;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .problem-text {
    font-size: 15px;
    line-height: 1.9;
    color: #333;
  }
  .problem-text p { margin-bottom: 8px; }
  .hint-box {
    background: #f7faf8;
    border-left: 4px solid #5b8a72;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
    line-height: 1.8;
    color: #555;
  }
  .hint-box .hint-label {
    font-weight: 700;
    color: #5b8a72;
    margin-bottom: 4px;
  }
  .answer-box {
    background: #f0faf4;
    border-radius: 10px;
    padding: 16px;
  }
  .answer-text {
    font-size: 14px;
    line-height: 2;
    color: #333;
  }
  .answer-text .final-answer {
    display: inline-block;
    background: #5b8a72;
    color: white;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 6px;
    margin-top: 4px;
  }
  .footer {
    background: #f7faf8;
    padding: 12px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #999;
  }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="header-left">
      <div class="label">📐 每日一题 · 数学</div>
      <div class="issue">第 {{issue}} 期</div>
    </div>
    <div class="header-right">
      <div class="date">{{date}} {{day_of_week}}</div>
      <div class="subject">★ 七年级下 · 浙教版</div>
    </div>
  </div>

  <div class="section">
    <div class="tag">🏷️ {{topic}}</div>
    <div class="section-title">📝 今日题目</div>
    <div class="problem-text">
      {{problem_content}}
    </div>
  </div>

  <div class="section">
    <div class="section-title">💡 思路提示</div>
    <div class="hint-box">
      <div class="hint-label">解题关键：</div>
      {{hint_content}}
    </div>
  </div>

  <div class="section">
    <div class="section-title">✅ 答案与解析</div>
    <div class="answer-box">
      <div class="answer-text">
        {{solution_content}}
      </div>
    </div>
  </div>

  <div class="footer">
    <span>🦞 大脑袋 · 数学每日一题</span>
    <span>杭州中考高频考点 · 七年级下</span>
  </div>
</div>
</body>
</html>
